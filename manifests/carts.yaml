apiVersion: apps/v1
kind: Deployment
metadata:
  name: carts
  namespace: retail-app
  labels:
    app: carts
spec:
  replicas: 1
  selector:
    matchLabels:
      app: carts
  template:
    metadata:
      labels:
        app: carts
    spec:
      containers:
      - name: carts
        image: public.ecr.aws/aws-containers/retail-store-sample-app-carts:0.6.0
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: CARTS_DYNAMODB_TABLENAME
          value: "project-bedrock-carts" 
        - name: AWS_REGION
          value: "us-east-1"
        resources:
          limits:
            memory: 512Mi
            cpu: "500m"
          requests:
            memory: 256Mi
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: carts
  namespace: retail-app
  labels:
    app: carts
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    name: http
  selector:
    app: carts