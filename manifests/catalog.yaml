apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog
  namespace: retail-app
  labels:
    app: catalog
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalog
  template:
    metadata:
      labels:
        app: catalog
    spec:
      containers:
      - name: catalog
        image: public.ecr.aws/aws-containers/retail-store-sample-app-catalog:0.6.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        # Ingress environment hooks pointing directly to our AWS database configurations
        env:
        - name: DB_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: mysql_host
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: mysql_user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: mysql_password
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: mysql_database
        resources:
          limits:
            memory: 512Mi
            cpu: "500m"
          requests:
            memory: 256Mi
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: catalog
  namespace: retail-app
  labels:
    app: catalog
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    name: http
  selector:
    app: catalog