apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  namespace: retail-app
  labels:
    app: ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
    spec:
      containers:
      - name: ui
        image: public.ecr.aws/aws-containers/retail-store-sample-app-ui:0.6.0
        ports:
        - containerPort: 8080
          name: http
        resources:
          limits:
            memory: 512Mi
            cpu: "500m"
          requests:
            memory: 256Mi
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: ui
  namespace: retail-app
  labels:
    app: ui
spec:
  type: NodePort # Mandatory type required so the AWS ALB can route target groups directly to the pods
  ports:
  - port: 80
    targetPort: 8080
    name: http
  selector:
    app: ui
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ui-ingress
  namespace: retail-app
  annotations:
    # EXAM CONSTRAINT: Tells the controller to intercept this and spin up a native AWS Application Load Balancer
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ui
            port:
              number: 80